name: Sync bundled skills

on:
  schedule:
    - cron: '17 6 * * *' # daily at ~6:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone zflow
        uses: actions/checkout@v4
        with:
          repository: hashangit/zflow
          ref: main
          path: _src/zflow

      - name: Clone doc-assist
        uses: actions/checkout@v4
        with:
          repository: hashangit/doc-assist
          ref: main
          path: _src/doc-assist

      - name: Sync skill directories
        run: |
          for skill in zflow doc-assist; do
            rm -rf "skills/${skill}"
            cp -r "_src/${skill}" "skills/${skill}"
            rm -rf "skills/${skill}/.git"
          done

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet skills/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/
          CHANGES=""
          for skill in zflow doc-assist; do
            SHA=$(cd "_src/${skill}" && git rev-parse --short HEAD)
            CHANGES="${CHANGES} ${skill}@${SHA}"
          done
          git commit -m "chore: sync bundled skills (${CHANGES## })"
          git push
