name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  publish-npm:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-homebrew:
    needs: publish-npm
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Fetch npm tarball and compute SHA256
        id: sha
        run: |
          curl -fsSL "https://registry.npmjs.org/zoe-agent/-/zoe-agent-${{ steps.ver.outputs.version }}.tgz" -o pkg.tgz
          echo "sha256=$(sha256sum pkg.tgz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Bump tap formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/hashangit/homebrew-zoe.git tap
          cd tap
          F="Formula/zoe-agent.rb"
          sed -i "s|^  url .*|  url \"https://registry.npmjs.org/zoe-agent/-/zoe-agent-${{ steps.ver.outputs.version }}.tgz\"|" "$F"
          sed -i "s|^  sha256 .*|  sha256 \"${{ steps.sha.outputs.sha256 }}\"|" "$F"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$F"
          git commit -m "zoe-agent ${{ steps.ver.outputs.version }}" || echo "no changes"
          git push

  github-release:
    needs: publish-npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check for committed release notes
        id: notes
        run: |
          NOTES_FILE="RELEASE_NOTES-v${{ steps.ver.outputs.version }}.md"
          if [[ -f "$NOTES_FILE" ]]; then
            echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: ${{ steps.notes.outputs.found != 'true' }}
