<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Main circle -->
  <circle cx="50" cy="50" r="45" fill="url(#logo-gradient)"/>

  <!-- Z shape -->
  <path d="M 35 30 L 65 30 L 35 70 L 65 70"
        stroke="white"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Claw marks -->
  <path d="M 30 50 L 25 55"
        stroke="white"
        stroke-width="3"
        stroke-linecap="round"/>
  <path d="M 30 55 L 24 59"
        stroke="white"
        stroke-width="3"
        stroke-linecap="round"/>
  <path d="M 30 60 L 25 64"
        stroke="white"
        stroke-width="3"
        stroke-linecap="round"/>

  <path d="M 70 40 L 75 35"
        stroke="white"
        stroke-width="3"
        stroke-linecap="round"/>
  <path d="M 70 45 L 76 41"
        stroke="white"
        stroke-width="3"
        stroke-linecap="round"/>
  <path d="M 70 50 L 75 46"
        stroke="white"
        stroke-width="3"
        stroke-linecap="round"/>
</svg>
